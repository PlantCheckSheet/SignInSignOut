<!DOCTYPE html>
<html>
<head>
<title>JAO Groundworks Ltd - Visitor Sign In</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial, Helvetica, sans-serif;
  background:#0d0d0d;
  text-align:center;
  margin:0;
  padding:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  background:#1a1a1a;
  padding:30px;
  width:500px;
  max-width:95%;
  border-radius:12px;
  border:1px solid #2a2a2a;
  box-shadow:0 0 25px rgba(245,130,32,0.18);
}

.logo{
  max-width:260px;
  margin-bottom:25px;
  filter:
    drop-shadow(0 0 8px rgba(255,255,255,0.6))
    drop-shadow(0 0 18px rgba(255,255,255,0.3));
  transition: all 0.3s ease;
}

.logo:hover{
  transform: scale(1.06);
  filter:
    drop-shadow(0 0 12px rgba(255,255,255,0.9))
    drop-shadow(0 0 28px rgba(255,255,255,0.5));
}

h2{
  color:#f58220;
  margin:5px 0;
}

h3{
  color:#fff;
  margin-bottom:20px;
}

input{
  width:95%;
  padding:13px;
  margin:7px 0;
  font-size:16px;
  border-radius:6px;
  border:1px solid #444;
  background:#111;
  color:#fff;
}

input::placeholder{
  color:#aaa;
}

button{
  width:95%;
  padding:14px;
  margin-top:10px;
  font-size:18px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.signin{
  background:#f58220;
  color:white;
}

.signout{
  background:#555;
  color:white;
}

.camera-btn{
  background:#222;
  color:white;
  border:1px solid #f58220;
}

.signin:hover{ background:#d96f18; }
.signout:hover{ background:#444; }
.camera-btn:hover{ background:#333; }

.success{
  color:#39d353;
  margin-top:12px;
  font-weight:bold;
}

.device-status{
  margin-top:15px;
  font-size:14px;
  color:#bbb;
}

.photo-preview{
  display:none;
  width:180px;
  margin:15px auto;
  border-radius:10px;
  border:2px solid #f58220;
}

.consent{
  color:#aaa;
  font-size:12px;
  margin:10px auto;
  max-width:400px;
}

.modal{
  display:none;
  position:fixed;
  z-index:1000;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
}

.modal-content{
  background:#1a1a1a;
  margin:15% auto;
  padding:25px;
  border-radius:12px;
  border:1px solid #f58220;
  width:80%;
  max-width:400px;
  color:#fff;
}

.close-btn{
  background:#f58220;
  color:white;
  padding:10px 20px;
  margin-top:15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h2>JAO Groundworks Ltd</h2>
<h3>Sign In / Out</h3>

<input type="text" id="name" placeholder="Full Name *">
<input type="text" id="vehicle" placeholder="Vehicle Registration *">
<input type="text" id="site" placeholder="Site Location *">

<input type="file" id="cameraInput" accept="image/*" capture="user" style="display:none;" onchange="handlePhoto(event)">

<button class="camera-btn" onclick="openCamera()">Take Sign-In Photo</button>

<img id="photoPreview" class="photo-preview">

<p class="consent">
  By signing in, you confirm that your details and sign-in photo may be stored for site attendance and safety records.
</p>

<button class="signin" onclick="signIn()">Sign In</button>
<button class="signout" onclick="signOut()">Sign Out This Device</button>

<p class="success" id="message"></p>

<p class="device-status" id="deviceStatus"></p>

</div>

<div id="popupModal" class="modal">
<div class="modal-content">
<p>Signed in successfully.</p>
<button class="close-btn" onclick="closeModal()">OK</button>
</div>
</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbxH1p_PiBFm45VSpBC83nSPDkSVjuJFg_YIIMchO5u2ivyn7ibNZuA52weq8p4mqyX1VA/exec";

let capturedPhoto = "";

/* CAMERA */

function openCamera(){
  document.getElementById("cameraInput").click();
}

function handlePhoto(event){
  const file = event.target.files[0];

  if(!file){
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    const img = new Image();

    img.onload = function(){
      const canvas = document.createElement("canvas");
      const maxWidth = 350;
      const scale = maxWidth / img.width;

      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      capturedPhoto = canvas.toDataURL("image/jpeg", 0.45);

      const preview = document.getElementById("photoPreview");
      preview.src = capturedPhoto;
      preview.style.display = "block";

      showMessage("Photo captured successfully.");
    };

    img.src = e.target.result;
  };

  reader.readAsDataURL(file);
}

/* DEVICE STATUS */

function updateDeviceStatus(){
  const status=document.getElementById("deviceStatus");

  if(localStorage.getItem("jaoSignedIn")==="true"){
    const name=localStorage.getItem("jaoSignedInName");
    const vehicle=localStorage.getItem("jaoSignedInVehicle");
    const site=localStorage.getItem("jaoSignedInSite");

    status.innerText=`This device is signed in as ${name} (${vehicle}) at ${site}`;
  }else{
    status.innerText="This device is currently signed out.";
  }
}

/* UI MESSAGE */

function showMessage(text){
  const msg=document.getElementById("message");
  msg.innerText=text;
  setTimeout(()=>msg.innerText="",8000);
}

/* SIGN IN */

async function signIn(){

  if(localStorage.getItem("jaoSignedIn")==="true"){
    const signedInName=localStorage.getItem("jaoSignedInName");
    const signedInVehicle=localStorage.getItem("jaoSignedInVehicle");
    const signedInSite=localStorage.getItem("jaoSignedInSite");

    alert(`${signedInName} (${signedInVehicle}) is already signed in on this device at ${signedInSite}. Please sign out first.`);
    return;
  }

  const name=document.getElementById("name").value.trim();
  const vehicle=document.getElementById("vehicle").value.trim();
  const site=document.getElementById("site").value.trim();

  if(!name||!vehicle||!site){
    alert("Please complete all fields.");
    return;
  }

  if(!capturedPhoto){
    alert("Please take a sign-in photo before signing in.");
    return;
  }

  try{

    const response = await fetch(scriptURL,{
      method:"POST",
      body:JSON.stringify({
        action:"signIn",
        name,
        vehicle,
        site,
        photo: capturedPhoto
      })
    });

    const result = await response.text();

    if(result !== "SIGNED_IN"){
      alert("There was a problem signing in. Please try again.");
      return;
    }

    localStorage.setItem("jaoSignedIn","true");
    localStorage.setItem("jaoSignedInName",name);
    localStorage.setItem("jaoSignedInVehicle",vehicle);
    localStorage.setItem("jaoSignedInSite",site);

    updateDeviceStatus();

    showMessage("Signed in successfully!");
    clearFields();
    clearPhoto();
    showModal();

  }catch{
    alert("Error signing in.");
  }

}

/* SIGN OUT */

async function signOut(){

  if(localStorage.getItem("jaoSignedIn")!=="true"){
    alert("This device is not currently signed in.");
    return;
  }

  const name=localStorage.getItem("jaoSignedInName");
  const vehicle=localStorage.getItem("jaoSignedInVehicle");
  const site=localStorage.getItem("jaoSignedInSite");

  try{

    const response = await fetch(scriptURL,{
      method:"POST",
      body:JSON.stringify({
        action:"signOut",
        name,
        vehicle,
        site
      })
    });

    const result = await response.text();

    if(result !== "SIGNED_OUT"){
      alert("No active sign-in was found for this device.");
      return;
    }

    localStorage.removeItem("jaoSignedIn");
    localStorage.removeItem("jaoSignedInName");
    localStorage.removeItem("jaoSignedInVehicle");
    localStorage.removeItem("jaoSignedInSite");

    updateDeviceStatus();

    showMessage("Signed out successfully!");
    clearFields();
    clearPhoto();

  }catch{
    alert("Error signing out.");
  }

}

/* HELPERS */

function clearFields(){
  document.querySelectorAll("input[type='text']").forEach(i=>i.value="");
}

function clearPhoto(){
  capturedPhoto = "";
  document.getElementById("cameraInput").value = "";
  const preview = document.getElementById("photoPreview");
  preview.src = "";
  preview.style.display = "none";
}

function showModal(){
  document.getElementById("popupModal").style.display="block";
}

function closeModal(){
  document.getElementById("popupModal").style.display="none";
}

window.onclick=function(event){
  const modal=document.getElementById("popupModal");
  if(event.target==modal) modal.style.display="none";
}

window.onload=updateDeviceStatus;

</script>

</body>
</html>
